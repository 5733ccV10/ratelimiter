spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ratelimiter?TimeZone=UTC
    username: ratelimiter
    password: ratelimiter
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate   # Flyway owns schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          '[time_zone]': UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
server:
  port: 8080
logging:
  structured:
    format:
      console: logstash
  level:
    root: WARN
    com.carrera.ratelimiter: INFO